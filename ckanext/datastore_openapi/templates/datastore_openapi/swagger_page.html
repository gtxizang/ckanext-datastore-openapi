<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} — Swagger</title>
<link rel="icon" href="/base/images/ckan.ico" type="image/x-icon">
<link rel="stylesheet" href="{{ vendor_base }}/swagger-ui.css">
<link rel="stylesheet" href="{{ vendor_base }}/swagger-page.css">
</head>
<body>
<div class="page-header">
  <div class="page-header-inner">
    <div class="page-header-title">{{ title }}</div>
    <nav class="page-header-nav">
      <a href="{{ back_url }}">&#8592; {{ _(back_label) }}</a>
      <a href="{{ site_url }}">{{ site_url }}</a>
    </nav>
  </div>
</div>
<div id="swagger-ui" data-spec-url="{{ spec_url }}"><div class="loading-message">{{ _('Loading API documentation') }}&hellip;</div></div>
<script src="{{ vendor_base }}/swagger-ui-bundle.js"></script>
<script src="{{ vendor_base }}/swagger-page.js"></script>
</body>
</html>
